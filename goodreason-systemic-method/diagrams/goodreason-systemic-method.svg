<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1000" viewBox="0 0 1400 1000">
  <rect width="1400" height="1000" fill="#111111"/>
  <text x="700" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" fill="#ffd900">GoodReason Systemic Method</text>
  <text x="700" y="112" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#f5f5f5">SOI-centred • SuperJSON-guided • AI-compatible • epistemic modelling</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- central SOI -->
  <circle cx="700" cy="500" r="145" fill="#ffd900" stroke="#fff176" stroke-width="3" filter="url(#shadow)"/>
  <text x="700" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#0b2a3a">SOI</text>
  <text x="700" y="510" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#0b2a3a">System of</text>
  <text x="700" y="545" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#0b2a3a">Interest</text>

  <!-- spokes -->
  <g stroke="#d8d8d8" stroke-width="4" opacity="0.85">
    <line x1="700" y1="355" x2="700" y2="225"/>
    <line x1="803" y1="397" x2="1010" y2="250"/>
    <line x1="845" y1="500" x2="1090" y2="500"/>
    <line x1="803" y1="603" x2="1010" y2="750"/>
    <line x1="700" y1="645" x2="700" y2="805"/>
    <line x1="597" y1="603" x2="390" y2="750"/>
    <line x1="555" y1="500" x2="310" y2="500"/>
    <line x1="597" y1="397" x2="390" y2="250"/>
  </g>

  <!-- function circles -->
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle" filter="url(#shadow)">
    <circle cx="700" cy="205" r="105" fill="#f3f3f3" stroke="#ffffff" stroke-width="2"/>
    <text x="700" y="175" font-size="44" font-weight="700" fill="#0b2a3a">α</text>
    <text x="700" y="215" font-size="21" font-weight="700" fill="#111">Purpose</text>
    <text x="700" y="242" font-size="18" fill="#111">orientation</text>

    <circle cx="1030" cy="235" r="105" fill="#f3f3f3" stroke="#ffffff" stroke-width="2"/>
    <text x="1030" y="205" font-size="44" font-weight="700" fill="#0b2a3a">π</text>
    <text x="1030" y="245" font-size="21" font-weight="700" fill="#111">Theory</text>
    <text x="1030" y="272" font-size="18" fill="#111">principles</text>

    <circle cx="1120" cy="500" r="105" fill="#f3f3f3" stroke="#ffffff" stroke-width="2"/>
    <text x="1120" y="470" font-size="44" font-weight="700" fill="#0b2a3a">φ</text>
    <text x="1120" y="510" font-size="21" font-weight="700" fill="#111">Output</text>
    <text x="1120" y="537" font-size="18" fill="#111">solution value</text>

    <circle cx="1030" cy="765" r="105" fill="#f3f3f3" stroke="#ffffff" stroke-width="2"/>
    <text x="1030" y="735" font-size="44" font-weight="700" fill="#0b2a3a">τ</text>
    <text x="1030" y="775" font-size="21" font-weight="700" fill="#111">Integration</text>
    <text x="1030" y="802" font-size="18" fill="#111">Science 2.0</text>

    <circle cx="700" cy="825" r="105" fill="#f3f3f3" stroke="#ffffff" stroke-width="2"/>
    <text x="700" y="795" font-size="44" font-weight="700" fill="#0b2a3a">Ω</text>
    <text x="700" y="835" font-size="21" font-weight="700" fill="#111">Feedback</text>
    <text x="700" y="862" font-size="18" fill="#111">development</text>

    <circle cx="370" cy="765" r="105" fill="#f3f3f3" stroke="#ffffff" stroke-width="2"/>
    <text x="370" y="735" font-size="44" font-weight="700" fill="#0b2a3a">ΔΨ</text>
    <text x="370" y="775" font-size="21" font-weight="700" fill="#111">Pressure</text>
    <text x="370" y="802" font-size="18" fill="#111">renewal</text>

    <circle cx="280" cy="500" r="105" fill="#f3f3f3" stroke="#ffffff" stroke-width="2"/>
    <text x="280" y="470" font-size="44" font-weight="700" fill="#0b2a3a">χ</text>
    <text x="280" y="510" font-size="21" font-weight="700" fill="#111">Input</text>
    <text x="280" y="537" font-size="18" fill="#111">isomorphism</text>

    <circle cx="370" cy="235" r="105" fill="#f3f3f3" stroke="#ffffff" stroke-width="2"/>
    <text x="370" y="205" font-size="44" font-weight="700" fill="#0b2a3a">β</text>
    <text x="370" y="245" font-size="21" font-weight="700" fill="#111">Organisation</text>
    <text x="370" y="272" font-size="18" fill="#111">validation</text>
  </g>

  <rect x="185" y="910" width="1030" height="52" rx="24" fill="#0b2a3a" stroke="#1e88e5" stroke-width="2"/>
  <text x="700" y="945" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="21" fill="#ffffff">
    Best-fit modelling minimises residual error between source material and the SuperJSON α–Ω architecture.
  </text>
</svg>
